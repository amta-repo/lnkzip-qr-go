<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fallback title/description (per-route pages override via react-helmet) -->
  <title>lnkzip — Free URL Shortener & QR Code Generator API</title>
  <meta name="description" content="Free URL shortener and QR code generator API. Create custom short links, track clicks, and generate QR codes instantly. No sign-up required." />
  <meta name="author" content="lnkzip" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

  <!-- Google Search Console -->
  <meta name="google-site-verification" content="nJYKnn2lkoQHbD0WBZqHGZwq_rodX5suH-ph6xC-wAM" />

  <!-- Discovery -->
  <link rel="alternate" type="application/rss+xml" title="lnkzip RSS Feed" href="/rss.xml" />
  <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />

  <!-- Google AdSense -->
  <meta name="google-adsense-account" content="ca-pub-8254053876036461" />

  <!-- Default Open Graph (per-route pages override title/description/url) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="lnkzip" />
  <meta property="og:title" content="lnkzip — Free URL Shortener & QR Code Generator API" />
  <meta property="og:description" content="Shorten URLs, generate QR codes, and track clicks. Free API, no sign-up required." />
  <meta property="og:image" content="https://lnkzip.com/favicon.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="lnkzip — Free URL Shortener & QR Code Generator" />
  <meta name="twitter:description" content="Shorten URLs, generate QR codes, and track clicks. Free API, no sign-up required." />
  <meta name="twitter:image" content="https://lnkzip.com/favicon.png" />

  <!-- Favicon (lnkzip brand) -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <!-- Sitewide Organization + WebSite JSON-LD -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "lnkzip",
      "url": "https://lnkzip.com",
      "logo": "https://lnkzip.com/favicon.png",
      "description": "lnkzip is a free URL shortener and QR code generator with a public API.",
      "sameAs": []
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "lnkzip",
      "url": "https://lnkzip.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://lnkzip.com/blog?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8254053876036461" crossorigin="anonymous"></script>
</body>

</html>
